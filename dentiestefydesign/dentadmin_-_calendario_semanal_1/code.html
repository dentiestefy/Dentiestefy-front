<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DentAdmin - Nueva Cita</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#87E1FF",
                        "text-primary": "#1E2A32",
                        "background-light": "#f4faff",
                        "background-dark": "#101d22",
                        "surface": "#ffffff",
                        "status-modified": "#FFB74D",
                        "status-cancelled": "#EF5350",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    spacing: {
                        '8pt': '8px',
                        '16pt': '16px',
                        '24pt': '24px',
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .modal-overlay {
            background-color: rgba(30, 42, 50, 0.4);
            backdrop-filter: blur(4px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden opacity-50 pointer-events-none">
<header class="bg-surface dark:bg-slate-900 px-4 pt-4 pb-2 border-b border-primary/10 flex flex-col gap-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border border-primary/30">
<img alt="Dr. Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCT14fT3BY7rIhHvaFoYgwlvNecyAWN9rHPlA-iltsFYi76P2RJ1IvF8kGH6pl7NiO3ch5w0w1scP9C0bGcyLjNJRxBLugfHrSnYNES_fKoHOTJ1ad4le2yJDs0rfmaZpL9GFGWBxhsF7oH05R7iVxYBOKQF9qp0p1Ti5dqydbKvJJ_ZlUOx4NVKe81e1YptDFPp9EnjxWJGt8t_W9GtN2OTSOJFnqvKo2WObM-h9Dh9vf8Oj-7L12f4_m08G9wgV-uAxhxkYIfxrY"/>
</div>
<div>
<h1 class="text-lg font-bold leading-tight">Calendario</h1>
<p class="text-xs text-slate-500 dark:text-slate-400">Clínica San Dental</p>
</div>
</div>
<button class="p-2 rounded-full">
<span class="material-symbols-outlined text-slate-600">notifications</span>
</button>
</div>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-slate-400 text-sm">search</span>
</div>
<input class="block w-full p-2.5 pl-10 text-sm rounded-xl bg-slate-100" placeholder="Buscar paciente..." type="text"/>
</div>
</header>
<nav class="bg-surface dark:bg-slate-900 border-b border-primary/10 px-4">
<div class="flex items-center justify-between gap-2 py-3">
<button class="flex flex-col items-center justify-center min-w-[56px] py-2 rounded-xl bg-primary/20 text-slate-700">
<span class="text-[10px] font-bold uppercase">Lun</span>
<span class="text-lg font-bold">12</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] py-2 rounded-xl">
<span class="text-[10px] font-bold uppercase">Mar</span>
<span class="text-lg font-bold">13</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] py-2 rounded-xl">
<span class="text-[10px] font-bold uppercase">Mié</span>
<span class="text-lg font-bold">14</span>
</button>
</div>
</nav>
<main class="flex-1 overflow-y-auto p-4 space-y-4">
<div class="grid grid-cols-[60px_1fr] gap-x-4">
<div class="text-xs text-slate-400 py-4 text-right">08:00 AM</div>
<div class="border-t border-slate-200 py-4">
<div class="bg-surface rounded-lg p-3 border-l-4 border-[#87E1FF] shadow-sm">
<h4 class="text-sm font-bold">Ricardo Milos</h4>
<p class="text-xs text-slate-500">08:00 - 08:45</p>
</div>
</div>
</div>
</main>
<footer class="bg-surface border-t border-primary/10 px-4 pb-6 pt-2">
<div class="flex justify-between items-center opacity-50">
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined font-fill text-[28px]">calendar_month</span>
<span class="text-[10px] font-bold">Calendario</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-[28px]">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-[28px]">description</span>
<span class="text-[10px] font-medium">Evoluciones</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-[28px]">group</span>
<span class="text-[10px] font-medium">Usuarios</span>
</div>
</div>
</footer>
</div>
<div class="absolute inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
<div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
<div class="px-6 pt-6 pb-2">
<h2 class="text-xl font-bold text-text-primary">Nueva Cita</h2>
</div>
<form class="p-6 space-y-4">
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">Nombre del Paciente</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm transition-all" placeholder="Ej. Juan Pérez" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">RUT</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm transition-all" placeholder="12.345.678-9" type="text"/>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">Edad</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm transition-all" placeholder="00" type="number"/>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">Doctor</label>
<div class="relative">
<select class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm appearance-none transition-all">
<option disabled="" selected="" value="">Seleccionar Doctor</option>
<option value="1">Dr. Alejandro Silva</option>
<option value="2">Dra. Beatriz Morales</option>
<option value="3">Dr. Carlos Fuente</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3.5 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">Fecha</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm transition-all" type="date"/>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">Hora</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm transition-all" type="time"/>
</div>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-text-primary uppercase tracking-wider">Descripción</label>
<textarea class="w-full p-4 rounded-xl border-slate-200 bg-slate-50 focus:border-primary focus:ring-primary text-sm transition-all resize-none" placeholder="Motivo de la consulta..." rows="3"></textarea>
</div>
<div class="flex flex-col gap-3 pt-2">
<button class="w-full h-12 bg-[#87E1FF] hover:bg-[#6ed3f7] text-text-primary font-bold rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
                    Programar Cita
                </button>
<button class="w-full h-12 border-2 border-slate-100 text-slate-500 font-bold rounded-xl hover:bg-slate-50 transition-all active:scale-[0.98]" type="button">
                    Cancelar
                </button>
</div>
</form>
</div>
</div>

</body></html>
