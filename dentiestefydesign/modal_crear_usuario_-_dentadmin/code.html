<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Usuario - DentAdmin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#85e0ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f1e23",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .glass-overlay {
            background: rgba(15, 30, 35, 0.4);
            backdrop-filter: blur(8px);
        }
        .form-select-custom {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<!-- Blurred Background (Dashboard Mockup) -->
<div class="fixed inset-0 z-0 flex overflow-hidden">
<!-- Sidebar -->
<aside class="w-20 lg:w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col p-4 gap-6">
<div class="h-10 w-10 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-slate-900">dentistry</span>
</div>
<div class="flex flex-col gap-4">
<div class="h-8 w-full bg-slate-100 dark:bg-slate-800 rounded"></div>
<div class="h-8 w-full bg-slate-100 dark:bg-slate-800 rounded"></div>
<div class="h-8 w-full bg-primary/20 rounded border-l-4 border-primary"></div>
</div>
</aside>
<!-- Main Content (Blurred) -->
<main class="flex-1 p-8">
<div class="flex justify-between items-center mb-8">
<div class="h-10 w-48 bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-10 w-32 bg-primary rounded"></div>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="h-20 w-full bg-white dark:bg-slate-800 rounded-lg shadow-sm"></div>
<div class="h-20 w-full bg-white dark:bg-slate-800 rounded-lg shadow-sm"></div>
<div class="h-20 w-full bg-white dark:bg-slate-800 rounded-lg shadow-sm"></div>
<div class="h-20 w-full bg-white dark:bg-slate-800 rounded-lg shadow-sm"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 glass-overlay flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-900 w-full max-w-[520px] rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Header -->
<div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="size-10 bg-primary/10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person_add</span>
</div>
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Crear Nuevo Usuario</h2>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Scrollable if needed) -->
<div class="p-6 space-y-8 overflow-y-auto max-h-[70vh]">
<!-- Section: Información del Usuario -->
<section>
<h3 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Información del Usuario</h3>
<div class="space-y-4">
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 block">Nombre Completo</span>
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Ej. Dr. Alejandro Méndez" type="text"/>
</label>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 block">Nombre de Usuario</span>
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="amendez_dent" type="text"/>
</label>
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 block">Rol</span>
<select class="form-select-custom w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
<option value="doctor">Doctor</option>
<option value="secretaria">Secretaria</option>
<option selected="" value="admin">Admin</option>
</select>
</label>
</div>
</div>
</section>
<!-- Section: Seguridad -->
<section>
<h3 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Seguridad</h3>
<div class="space-y-4">
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 block">Contraseña</span>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 block">Confirmar Contraseña</span>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
</div>
</section>
</div>
<!-- Footer -->
<div class="p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row justify-end gap-3">
<button class="w-full sm:w-auto px-6 h-11 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Cancelar
                </button>
<button class="w-full sm:w-auto px-6 h-11 rounded-lg bg-primary text-slate-900 font-bold shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
                    Crear Usuario
                </button>
</div>
</div>
</div>
</body></html>
